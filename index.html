<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RLC AC Circuits Interactive Quiz</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- MathJax Configuration -->
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js" async></script>
</head>
<body class="bg-gray-50 font-sans">
    
    <div id="app"></div>

    <script>
        // Quiz Data
        const quizData = [
            {
                "question": "According to the introduction of the lab manual, what is the primary function of a resistor in an AC circuit compared to inductors and capacitors?",
                "answerOptions": [
                { "text": "It stores electrical charge in an electric field.", "rationale": "This describes the fundamental property of a capacitor, not a resistor.", "isCorrect": false },
                { "text": "It opposes any change in the flow of electrical current.", "rationale": "This describes the behavior of an inductor (Lenz's law).", "isCorrect": false },
                { "text": "It dissipates heat by converting electrical energy.", "rationale": "Resistors simply convert electrical energy into heat and do not vary their response based on the AC frequency.", "isCorrect": true },
                { "text": "It generates a magnetic field proportional to the current magnitude.", "rationale": "This is the primary physical characteristic of an inductor.", "isCorrect": false }
                ],
                "hint": "Think about what happens to the energy when current flows through a purely resistive element."
            },
            {
                "question": "In a series circuit containing linear components, what is the phase relationship between the current and voltage across an ideal capacitor?",
                "answerOptions": [
                { "text": "The voltage leads the current by $90^{\\circ}$.", "rationale": "This describes an inductor, not a capacitor.", "isCorrect": false },
                { "text": "The current leads the voltage by $90^{\\circ}$.", "rationale": "In a capacitor, current must flow first to build up the charge that creates the voltage, resulting in a $90^{\\circ}$ phase lead for the current.", "isCorrect": true },
                { "text": "They are exactly in phase.", "rationale": "Voltage and current are only in phase across an ideal resistor.", "isCorrect": false },
                { "text": "The current lags the voltage by $180^{\\circ}$.", "rationale": "A $180^{\\circ}$ phase shift means they are completely inverted, which does not represent the quadrature relationship of a capacitor.", "isCorrect": false }
                ],
                "hint": "Remember the acronym 'ELI the ICE man', where 'I' is current and 'E' is voltage."
            },
            {
                "question": "How does the lab manual define a 'phasor' in the context of AC circuit analysis?",
                "answerOptions": [
                { "text": "A physical instrument used to measure the phase difference between two waveforms.", "rationale": "A phasor is a mathematical concept, not a physical piece of laboratory equipment.", "isCorrect": false },
                { "text": "The ratio of true power to apparent power in an RLC circuit.", "rationale": "This is the definition of the Power Factor, not a phasor.", "isCorrect": false },
                { "text": "A specific frequency at which inductive and capacitive reactances cancel out.", "rationale": "This defines the resonant frequency ($f_o$), not a phasor.", "isCorrect": false },
                { "text": "A complex number used to represent a sinusoidal wave, taking into account both amplitude and phase angle.", "rationale": "Phasors allow AC sine waves to be represented as two-dimensional vectors with real and imaginary components to simplify circuit analysis.", "isCorrect": true }
                ],
                "hint": "Think about how we represent rotating AC waveforms mathematically on an XY axis."
            },
            {
                "question": "As the frequency of the applied sine wave increases, what happens theoretically to the inductive reactance ($X_L$) and capacitive reactance ($X_C$)?",
                "answerOptions": [
                { "text": "Both $X_L$ and $X_C$ increase.", "rationale": "This is incorrect because one reactance has a direct relationship with frequency, while the other has an inverse relationship.", "isCorrect": false },
                { "text": "$X_L$ increases, while $X_C$ decreases.", "rationale": "Because $X_L = 2\\pi fL$ (direct) and $X_C = 1 / (2\\pi fC)$ (inverse), increasing frequency raises inductive opposition and lowers capacitive opposition.", "isCorrect": true },
                { "text": "Both $X_L$ and $X_C$ decrease.", "rationale": "This contradicts the formulas for how these components react to high-frequency signals.", "isCorrect": false },
                { "text": "$X_L$ decreases, while $X_C$ increases.", "rationale": "This has the relationships backward. Inductors block high frequencies, while capacitors pass them easily.", "isCorrect": false }
                ],
                "hint": "Look at the location of the frequency variable ($f$) in the mathematical formulas for $X_L$ and $X_C$."
            },
            {
                "question": "Why does the lab procedure instruct you to measure the voltage across the resistor ($V_R$) to determine the phase of the total circuit current?",
                "answerOptions": [
                { "text": "Because the oscilloscope cannot physically connect to capacitors or inductors safely.", "rationale": "The oscilloscope can safely connect to any of these low-voltage lab components; safety is not the reason for this specific measurement choice.", "isCorrect": false },
                { "text": "Because $V_R$ is always equal to the total supply voltage ($V_S$) in an AC circuit.", "rationale": "In a series RLC circuit, the supply voltage is the vector sum of all component voltages, so $V_R$ rarely equals $V_S$ unless the circuit is at resonance.", "isCorrect": false },
                { "text": "Because the current and voltage are always perfectly in phase across an ideal resistor.", "rationale": "Since current is the same everywhere in a series circuit, and a resistor causes no phase shift, the shape and phase of $V_R$ perfectly mimics the total current.", "isCorrect": true },
                { "text": "Because the resistor is the only component that does not drop any voltage.", "rationale": "Resistors always drop voltage when current flows through them according to Ohm's Law.", "isCorrect": false }
                ],
                "hint": "Consider the unique property of an ideal resistor regarding phase shift compared to inductors and capacitors."
            },
            {
                "question": "Calculate the theoretical resonant frequency ($f_o$) of a series RLC circuit with $L = 50 \\text{ mH}$ and $C = 20 \\mu\\text{F}$.",
                "answerOptions": [
                { "text": "$159.15 \\text{ Hz}$", "rationale": "Using $f_o = \\frac{1}{2\\pi\\sqrt{LC}}$, we get $\\frac{1}{2\\pi\\sqrt{0.05 \\times 0.00002}} = \\frac{1}{2\\pi\\sqrt{10^{-6}}} = \\frac{1}{2\\pi \\times 0.001} \\approx 159.15 \\text{ Hz}$.", "isCorrect": true },
                { "text": "$1000.0 \\text{ Hz}$", "rationale": "This value ignores the $2\\pi$ in the denominator of the resonant frequency formula.", "isCorrect": false },
                { "text": "$318.3 \\text{ Hz}$", "rationale": "This is the result of missing a factor of 2 in the calculation, often from misplacing the square root or miscalculating the $2\\pi$ term.", "isCorrect": false },
                { "text": "$50.3 \\text{ Hz}$", "rationale": "This is a distractor value utilizing common numbers from other standard lab experiments.", "isCorrect": false }
                ],
                "hint": "Use the formula $f_o = \\frac{1}{2\\pi\\sqrt{LC}}$ and be very careful with the milli ($10^{-3}$) and micro ($10^{-6}$) conversions."
            },
            {
                "question": "A series RL circuit has a resistor of $1.5 \\text{ k}\\Omega$ and an inductive reactance ($X_L$) of $2.0 \\text{ k}\\Omega$ at a specific frequency. What is the total magnitude of the impedance ($Z$)?",
                "answerOptions": [
                { "text": "$3.5 \\text{ k}\\Omega$", "rationale": "This is the incorrect algebraic sum. Reactance and resistance are $90^{\\circ}$ out of phase and must be added as vectors.", "isCorrect": false },
                { "text": "$0.5 \\text{ k}\\Omega$", "rationale": "This is the incorrect algebraic difference between the two values.", "isCorrect": false },
                { "text": "$4.5 \\text{ k}\\Omega$", "rationale": "This is an arbitrary distractor value.", "isCorrect": false },
                { "text": "$2.5 \\text{ k}\\Omega$", "rationale": "Using the Pythagorean theorem for impedance vectors: $Z = \\sqrt{R^2 + X_L^2} = \\sqrt{1.5^2 + 2.0^2} = \\sqrt{2.25 + 4} = \\sqrt{6.25} = 2.5 \\text{ k}\\Omega$.", "isCorrect": true }
                ],
                "hint": "Remember that resistance and reactance form the legs of a right-angled triangle on a phasor diagram."
            },
            {
                "question": "According to the lab manual and setup, what specific hardware is used to easily adjust and supply the required values of resistance, capacitance, and inductance for the circuits?",
                "answerOptions": [
                { "text": "Function generators", "rationale": "The function generator provides the AC voltage signal, not the physical R, L, or C component values.", "isCorrect": false },
                { "text": "Decade boxes", "rationale": "Decade boxes contain internal arrays of components connected to rotary switches, allowing users to dial in exact R, L, or C values quickly.", "isCorrect": true },
                { "text": "Digital multimeters", "rationale": "Multimeters measure electrical properties; they do not supply or act as the components in the circuit.", "isCorrect": false },
                { "text": "Oscilloscope probes", "rationale": "Probes are used strictly for measuring and observing the voltage waveforms.", "isCorrect": false }
                ],
                "hint": "These devices usually have multiple rotary dials labeled with multipliers like $10^0$, $10^1$, and $10^2$."
            },
            {
                "question": "If you measure a phase angle of $-45^{\\circ}$ in a series RLC circuit, what does this tell you about the relationship between the components at that specific frequency?",
                "answerOptions": [
                { "text": "The inductive reactance is exactly equal to the resistance.", "rationale": "If inductive reactance equaled resistance, the phase angle would be $+45^{\\circ}$, not negative.", "isCorrect": false },
                { "text": "The circuit is at perfect resonance.", "rationale": "At perfect resonance, the phase angle is exactly $0^{\\circ}$.", "isCorrect": false },
                { "text": "The capacitive reactance is greater than the inductive reactance.", "rationale": "A negative phase angle means the current is leading the voltage, which is the defining characteristic of a circuit where capacitive reactance dominates.", "isCorrect": true },
                { "text": "The total impedance is purely resistive.", "rationale": "If it were purely resistive, there would be no phase shift ($0^{\\circ}$).", "isCorrect": false }
                ],
                "hint": "A negative phase angle means the circuit is acting 'capacitively' (ELI the ICE man)."
            },
            {
                "question": "In a series RC circuit, the supply voltage is $10 \\text{ V}$ rms, and the voltage across the resistor is measured at $6 \\text{ V}$ rms. What is the expected voltage across the capacitor ($V_C$)?",
                "answerOptions": [
                { "text": "$4 \\text{ V}$ rms", "rationale": "This incorrectly assumes simple algebraic subtraction ($10 - 6 = 4$), which ignores the vector nature of AC voltages.", "isCorrect": false },
                { "text": "$16 \\text{ V}$ rms", "rationale": "This is the incorrect algebraic sum, completely ignoring Kirchhoff's laws for AC circuits.", "isCorrect": false },
                { "text": "$8 \\text{ V}$ rms", "rationale": "Because the voltages form a right triangle ($V_S^2 = V_R^2 + V_C^2$), we calculate $V_C = \\sqrt{10^2 - 6^2} = \\sqrt{100 - 36} = \\sqrt{64} = 8 \\text{ V}$ rms.", "isCorrect": true },
                { "text": "$11.6 \\text{ V}$ rms", "rationale": "This incorrect calculation attempts to add the squares of the supply and resistor voltages instead of subtracting them.", "isCorrect": false }
                ],
                "hint": "Apply the Pythagorean theorem to the voltage phasors, where the supply voltage ($V_S$) is the hypotenuse."
            }
        ];

        // State Variables
        let currentQuestionIndex = 0;
        let selectedAnswers = {};
        let showResults = false;
        let showHint = false;

        // Render functions
        function renderView() {
            const app = document.getElementById('app');
            if (showResults) {
                app.innerHTML = getResultsHtml();
            } else {
                app.innerHTML = getQuestionHtml();
            }

            // Tell MathJax to typeset the newly injected HTML
            if (typeof MathJax !== 'undefined' && MathJax.typesetPromise) {
                MathJax.typesetClear();
                MathJax.typesetPromise([app]).catch((err) => console.log('MathJax error: ', err));
            }
        }

        function getQuestionHtml() {
            const currentQuestion = quizData[currentQuestionIndex];
            const progress = ((currentQuestionIndex) / quizData.length) * 100;
            const isNextDisabled = selectedAnswers[currentQuestionIndex] === undefined;

            let optionsHtml = '';
            currentQuestion.answerOptions.forEach((option, index) => {
                const isSelected = selectedAnswers[currentQuestionIndex] === index;
                const baseClasses = "w-full text-left p-5 rounded-xl border-2 transition-all duration-200";
                const selectedClasses = "border-blue-500 bg-blue-50 text-blue-900";
                const unselectedClasses = "border-gray-200 hover:border-blue-300 hover:bg-gray-50 text-gray-700";
                
                optionsHtml += `
                    <button onclick="handleOptionSelect(${index})" class="${baseClasses} ${isSelected ? selectedClasses : unselectedClasses}">
                        <span>${option.text}</span>
                    </button>
                `;
            });

            let hintSection = '';
            if (!showHint) {
                hintSection = `
                    <button onclick="toggleHint()" class="text-sm text-amber-600 hover:text-amber-700 font-medium flex items-center">
                        💡 Need a hint?
                    </button>
                `;
            } else {
                hintSection = `
                    <div class="bg-amber-50 border border-amber-200 rounded-lg p-4 text-sm text-amber-800">
                        <strong>Hint:</strong> <span>${currentQuestion.hint}</span>
                    </div>
                `;
            }

            return `
                <div class="py-12 px-4 sm:px-6 lg:px-8">
                    <div class="max-w-3xl mx-auto">
                        <!-- Header & Progress -->
                        <div class="mb-8">
                            <h1 class="text-3xl font-bold text-gray-900 mb-4 text-center">RLC AC Circuits</h1>
                            <div class="flex justify-between text-sm text-gray-500 font-medium mb-2">
                                <span>Question ${currentQuestionIndex + 1} of ${quizData.length}</span>
                                <span>${Math.round(progress)}% Completed</span>
                            </div>
                            <div class="w-full bg-gray-200 rounded-full h-2.5">
                                <div class="bg-blue-600 h-2.5 rounded-full transition-all duration-300" style="width: ${progress}%"></div>
                            </div>
                        </div>

                        <!-- Question Card -->
                        <div class="bg-white rounded-2xl shadow-xl overflow-hidden">
                            <div class="p-8">
                                <h2 class="text-xl font-semibold text-gray-800 mb-6 leading-relaxed">
                                   <span>${currentQuestion.question}</span>
                                </h2>

                                <div class="space-y-3">
                                    ${optionsHtml}
                                </div>

                                <!-- Hint Section -->
                                <div class="mt-6">
                                    ${hintSection}
                                </div>
                            </div>

                            <!-- Navigation Footer -->
                            <div class="bg-gray-50 px-8 py-5 border-t border-gray-100 flex justify-between items-center">
                                <button onclick="handlePrev()" ${currentQuestionIndex === 0 ? 'disabled' : ''} class="font-medium py-2 px-6 rounded-lg transition duration-200 ${currentQuestionIndex === 0 ? 'text-gray-400 cursor-not-allowed' : 'text-gray-600 hover:bg-gray-200'}">
                                    Previous
                                </button>
                                <button onclick="handleNext()" ${isNextDisabled ? 'disabled' : ''} class="font-semibold py-3 px-8 rounded-lg transition duration-200 ${isNextDisabled ? 'bg-blue-300 text-white cursor-not-allowed' : 'bg-blue-600 hover:bg-blue-700 text-white shadow-md'}">
                                    ${currentQuestionIndex === quizData.length - 1 ? 'Submit Quiz' : 'Next Question'}
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function getResultsHtml() {
            const score = calculateScore();
            const percentage = Math.round((score / quizData.length) * 100);

            let reviewHtml = '';
            quizData.forEach((question, qIndex) => {
                const userAnswerIndex = selectedAnswers[qIndex];
                const isUserCorrect = userAnswerIndex !== undefined && question.answerOptions[userAnswerIndex].isCorrect;
                
                let optionsHtml = '';
                question.answerOptions.forEach((opt, oIndex) => {
                    let bgColor = "bg-gray-50 text-gray-700";
                    let borderColor = "border-gray-200";
                    let iconHtml = "";
                    
                    if (opt.isCorrect) {
                        bgColor = "bg-green-100 text-green-800";
                        borderColor = "border-green-400";
                        iconHtml = `<span class="ml-2 text-green-600 font-bold">✓ Correct</span>`;
                    } else if (userAnswerIndex === oIndex && !opt.isCorrect) {
                        bgColor = "bg-red-100 text-red-800";
                        borderColor = "border-red-400";
                        iconHtml = `<span class="ml-2 text-red-600 font-bold">✗ Your Answer</span>`;
                    }

                    optionsHtml += `
                        <div class="p-4 rounded-lg border ${bgColor} ${borderColor} flex items-start">
                            <div class="flex-1">${opt.text}</div>
                            ${iconHtml}
                        </div>
                    `;
                });

                const correctRationale = question.answerOptions.find(o => o.isCorrect).rationale;

                reviewHtml += `
                    <div class="bg-white rounded-xl shadow-md p-6 border-l-4 ${isUserCorrect ? 'border-green-500' : 'border-red-500'}">
                        <h3 class="text-lg font-semibold text-gray-800 mb-4">
                            <span class="text-gray-500 mr-2">${qIndex + 1}.</span> 
                            <span>${question.question}</span>
                        </h3>
                        
                        <div class="space-y-3 mb-4">
                            ${optionsHtml}
                        </div>
                        
                        <div class="bg-blue-50 text-blue-900 p-4 rounded-lg text-sm border border-blue-100">
                            <strong>Rationale:</strong> <span>${correctRationale}</span>
                        </div>
                    </div>
                `;
            });

            return `
                <div class="py-8 px-4 sm:px-6 lg:px-8">
                    <div class="max-w-4xl mx-auto">
                        <div class="bg-white rounded-xl shadow-lg p-8 mb-8 text-center">
                            <h1 class="text-3xl font-bold text-gray-900 mb-4">Quiz Completed!</h1>
                            <div class="text-6xl font-extrabold text-blue-600 mb-2">
                                ${score} / ${quizData.length}
                            </div>
                            <p class="text-xl text-gray-600 font-medium">
                                You scored ${percentage}%
                            </p>
                            <button onclick="resetQuiz()" class="mt-6 bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-8 rounded-lg transition duration-200">
                                Retake Quiz
                            </button>
                        </div>

                        <div class="space-y-8">
                            <h2 class="text-2xl font-bold text-gray-800 border-b pb-2">Review Your Answers</h2>
                            ${reviewHtml}
                        </div>
                    </div>
                </div>
            `;
        }

        // Action Handlers
        window.handleOptionSelect = function(optionIndex) {
            selectedAnswers[currentQuestionIndex] = optionIndex;
            renderView();
        };

        window.handleNext = function() {
            if (currentQuestionIndex < quizData.length - 1) {
                currentQuestionIndex++;
                showHint = false;
            } else {
                showResults = true;
            }
            renderView();
        };

        window.handlePrev = function() {
            if (currentQuestionIndex > 0) {
                currentQuestionIndex--;
                showHint = false;
                renderView();
            }
        };

        window.toggleHint = function() {
            showHint = true;
            renderView();
        }

        window.calculateScore = function() {
            let score = 0;
            quizData.forEach((q, index) => {
                const selected = selectedAnswers[index];
                if (selected !== undefined && q.answerOptions[selected].isCorrect) {
                    score++;
                }
            });
            return score;
        };

        window.resetQuiz = function() {
            currentQuestionIndex = 0;
            selectedAnswers = {};
            showResults = false;
            showHint = false;
            renderView();
        };

        // Initial Render
        document.addEventListener('DOMContentLoaded', () => {
            renderView();
        });

    </script>
</body>
</html>
